<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beyond Trees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1f2a24;
      --moss: #3f6b4f;
      --paper: #f5f3ec;
      --accent: #6b8e5a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #fbfaf4 0%, #eef0e6 55%, #e3e8da 100%);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .card { max-width: 640px; }
    .eyebrow {
      font-size: 0.8rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.4rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(2.6rem, 8vw, 4.4rem);
      line-height: 1.05;
      margin-bottom: 1.1rem;
    }
    h1 em { font-style: italic; color: var(--accent); }
    .tagline {
      font-size: clamp(1.05rem, 3.5vw, 1.35rem);
      color: #4a564d;
      margin-bottom: 2rem;
    }
    .placeholder {
      font-size: 1rem;
      color: #7a8576;
      font-style: italic;
    }
    .meta {
      margin-top: 2.6rem;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      color: #8a9384;
      line-height: 1.7;
    }
    .pulse {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 0.5rem;
      animation: pulse 2.4s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1.15); }
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">ATBC 2026 &middot; Symposium S-18</p>
    <h1>Beyond <em>Trees</em></h1>
    <p class="tagline">A more inclusive growth-form perspective on ecology and society in tropical landscapes.</p>
    <p class="placeholder"><span class="pulse"></span>This is about to be a great website.</p>
    <p class="meta">
      Lianas &middot; Palms &amp; Rattans &middot; Bamboos &middot; Epiphytes<br />
      Association for Tropical Biology and Conservation &middot; June 2026
    </p>
  </main>
</body>
</html>
